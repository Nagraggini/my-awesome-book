# A könyv alapadatai
[book]
authors = ["Freud Andrea"]
language = "hu"
multilingual = false
src = "src"
title = "Útmutató kezdőtől haladó szintig a programozáshoz"

# Megjelenés és HTML beállítások
[output.html]
# A téma színei és a betűtípusok alapértelmezett beállításai
default-theme = "light"
preferred-dark-theme = "navy"

# Kereső funkció (nagyon hasznos az olvasóknak)
search = true

# Git repository link (ha GitHubon vagy GitLabon van a kód)
git-repository-url = "https://github.com/felhasznalonev/projekt"
edit-url-template = "https://github.com/felhasznalonev/projekt/edit/main/src/{path}"

# Lehetővé teszi a kód futtatását és másolását egy gombnyomással. A Playpen bekapcsolása
[output.html.playground]
editable = true      # Szerkesztheti az olvasó a kódot?
copyable = true      # Legyen "Másolás" gomb a kódblokkon?
line-numbers = true  # Jelenjenek meg a sorszámok?
